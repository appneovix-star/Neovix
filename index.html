<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOVIX | Elevate Your Everyday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Fondo original que te gustó */
        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 5%;
            color: #ffffff;
        }

        .contenedor {
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        /* Logo cuadrado sin círculo */
        .logo {
            width: 260px;
            height: 260px;
            margin: 0 auto 2.5rem;
            background: transparent;
            border-radius: 0;
            border: none;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .marca {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin-bottom: 0.8rem;
        }

        /* Eslogan correcto */
        .eslogan {
            font-size: 1.1rem;
            color: #cccccc;
            letter-spacing: 4px;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        .redes {
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
            width: 100%;
        }

        .boton-red {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.3rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .boton-red:hover {
            background: rgba(255,255,255,0.15);
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .icono {
            font-size: 1.7rem;
            line-height: 1;
            display: flex;
            align-items: center;
        }

        .pie {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: #888888;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="logo">
            <img src="neovix.png" alt="NEOVIX">
        </div>

        <h1 class="marca">NEOVIX</h1>
        <p class="eslogan">ELEVATE YOUR EVERYDAY</p>

        <!-- Redes: solo 1 botón de Instagram con el logo correcto -->
        <div class="redes">
            <a href="https://www.instagram.com/neovix.store/" target="_blank" class="boton-red">
                <span class="icono">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <circle cx="12" cy="12" r="4"></circle>
                        <circle cx="18" cy="6" r="1"></circle>
                    </svg>
                </span>
                INSTAGRAM
            </a>
            <a href="https://facebook.com/" target="_blank" class="boton-red">
                <span class="icono">f</span> FACEBOOK
            </a>
            <a href="https://tiktok.com/" target="_blank" class="boton-red">
                <span class="icono">♪</span> TIKTOK
            </a>
            <a href="https://wa.me/521234567890" target="_blank" class="boton-red">
                <span class="icono">💬</span> WHATSAPP
            </a>
        </div>

        <div class="pie">
            © 2026 NEOVIX • Elevate Your Everyday
        </div>
    </div>
</body>
</html>
