<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOVIX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* 🔹 PRIMERA SECCIÓN: Ocupa toda la pantalla, solo fondo */
        .seccion-1 {
            width: 100%;
            height: 100vh; /* Altura exacta de la ventana */
            background: url("fondo-neovix.jpg") no-repeat center center;
            background-size: cover;
        }

        /* 🔹 SEGUNDA SECCIÓN: Redes sociales, otra pantalla completa */
        .seccion-2 {
            width: 100%;
            min-height: 100vh;
            background: url("fondo-redes.jpg") no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 5%;
            color: #ffffff;
            position: relative;
        }

        /* Capa oscura para que se lea bien el texto */
        .capa-sombra {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
        }

        .contenedor-redes {
            width: 100%;
            max-width: 550px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .redes {
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
            width: 100%;
        }

        .boton-red {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.3rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .boton-red:hover {
            background: rgba(255,255,255,0.18);
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .icono {
            font-size: 1.7rem;
            line-height: 1;
            display: flex;
            align-items: center;
        }

        .pie {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <!-- ✅ Primera parte: pantalla completa solo con el primer fondo -->
    <div class="seccion-1"></div>

    <!-- ✅ Segunda parte: al bajar, aparece el segundo fondo con las redes -->
    <div class="seccion-2">
        <div class="capa-sombra"></div>
        <div class="contenedor-redes">
            <div class="redes">
                <a href="https://www.instagram.com/neovix.store/" target="_blank" class="boton-red">
                    <span class="icono">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <circle cx="12" cy="12" r="4"></circle>
                            <circle cx="18" cy="6" r="1"></circle>
                        </svg>
                    </span>
                    INSTAGRAM
                </a>
                <a href="https://www.facebook.com/share/1TzuZk1uhR/?mibextid=wwXIfr" target="_blank" class="boton-red">
                    <span class="icono">f</span> FACEBOOK
                </a>
                <a href="https://tiktok.com/@tu_cuenta" target="_blank" class="boton-red">
                    <span class="icono">♪</span> TIKTOK
                </a>
                <a href="https://wa.me/521234567890" target="_blank" class="boton-red">
                    <span class="icono">💬</span> WHATSAPP
                </a>
            </div>
            <div class="pie">
                © 2026 NEOVIX
            </div>
        </div>
    </div>
</body>
</html>
