<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOVIX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* PRIMERA SECCIÓN: Solo fondo inicial, pantalla completa */
        .inicio {
            width: 100%;
            height: 100vh;
            background: url("./fondo-neovix.jpg") no-repeat center center;
            background-size: cover;
        }

        /* SEGUNDA SECCIÓN: Redes sociales con su propio fondo */
        .redes {
            width: 100%;
            min-height: 100vh;
            background: url("./fondo-redes.jpg") no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 5%;
            color: #ffffff;
            position: relative;
        }

        /* Capa para leer bien el texto */
        .capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
        }

        .contenedor {
            width: 100%;
            max-width: 550px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .lista-redes {
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
            width: 100%;
        }

        .boton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.3rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .boton:hover {
            background: rgba(255,255,255,0.18);
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .icono {
            font-size: 1.7rem;
            line-height: 1;
        }

        .pie {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <!-- 🔹 PRIMERA PARTE: Solo el primer fondo -->
    <div class="inicio"></div>

    <!-- 🔹 SEGUNDA PARTE: Redes con el segundo fondo -->
    <div class="redes">
        <div class="capa"></div>
        <div class="contenedor">
            <div class="lista-redes">
                <a href="https://www.instagram.com/neovix.store/" target="_blank" class="boton">
                    <span class="icono">📷</span> INSTAGRAM
                </a>
                <a href="https://www.facebook.com/share/1TzuZk1uhR/?mibextid=wwXIfr" target="_blank" class="boton">
                    <span class="icono">f</span> FACEBOOK
                </a>
                <a href="https://tiktok.com/@tu_cuenta" target="_blank" class="boton">
                    <span class="icono">♪</span> TIKTOK
                </a>
                <a href="https://wa.me/521234567890" target="_blank" class="boton">
                    <span class="icono">💬</span> WHATSAPP
                </a>
            </div>
            <div class="pie">© 2026 NEOVIX</div>
        </div>
    </div>

</body>
</html>
